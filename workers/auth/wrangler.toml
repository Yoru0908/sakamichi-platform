name = "sakamichi-auth"
main = "src/index.ts"
compatibility_date = "2024-05-01"

[vars]
CORS_ORIGIN = "https://46log.com,https://sakamichi-tools.cn,https://test.sakamichi-tools.cn,https://sakamichi-platform-test.pages.dev"
EMAIL_FROM = "noreply@sakamichi-tools.cn"
ALIST_URL = "https://gallery.46log.com"
# JWT_SECRET, DISCORD_CLIENT_ID, DISCORD_CLIENT_SECRET, etc.
# are set via `wrangler secret put <KEY>`

[[d1_databases]]
binding = "DB"
database_name = "sakamichi-auth"
database_id = "3fb05a7a-13bc-4f0c-8e30-31ac07eff235"

[[d1_databases]]
binding = "MIGURI_DB"
database_name = "miguri"
database_id = "969491b9-4960-4e5a-ab2d-37fa8e457b67"

# Routes: auth Worker handles /api/auth/* and /api/user/* on api subdomain
[[routes]]
pattern = "api.sakamichi-tools.cn/api/auth/*"
zone_name = "sakamichi-tools.cn"

[[routes]]
pattern = "api.sakamichi-tools.cn/api/user/*"
zone_name = "sakamichi-tools.cn"

[[routes]]
pattern = "api.46log.com/api/auth/*"
zone_name = "46log.com"

[[routes]]
pattern = "api.46log.com/api/user/*"
zone_name = "46log.com"

[[routes]]
pattern = "api.46log.com/api/community/*"
zone_name = "46log.com"

[[routes]]
pattern = "api.46log.com/api/repo/*"
zone_name = "46log.com"

[[routes]]
pattern = "api.46log.com/api/manage/*"
zone_name = "46log.com"

[[routes]]
pattern = "api.46log.com/api/miguri/*"
zone_name = "46log.com"

[[routes]]
pattern = "api.46log.com/api/webhook/*"
zone_name = "46log.com"

[[routes]]
pattern = "api.sakamichi-tools.cn/api/community/*"
zone_name = "sakamichi-tools.cn"

[[routes]]
pattern = "api.sakamichi-tools.cn/api/manage/*"
zone_name = "sakamichi-tools.cn"

[[routes]]
pattern = "api.sakamichi-tools.cn/api/miguri/*"
zone_name = "sakamichi-tools.cn"

[[routes]]
pattern = "api.sakamichi-tools.cn/api/webhook/*"
zone_name = "sakamichi-tools.cn"

[triggers]
crons = ["0 3 * * *"]  # Daily at 03:00 UTC (12:00 JST)

